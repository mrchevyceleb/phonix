name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version installer\phonix.iss
        shell: pwsh

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: phonix-portable
          path: target/release/phonix.exe
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: phonix-installer
          path: target/installer/PhonixSetup-*.exe
          if-no-files-found: error

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download portable exe
        uses: actions/download-artifact@v4
        with:
          name: phonix-portable
          path: artifacts/portable

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: phonix-installer
          path: artifacts/installer

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/portable/phonix.exe
            artifacts/installer/PhonixSetup-*.exe
